<script>
  // ========== 增强调试版完整脚本 ==========
  (function() {
    const STORAGE_KEY = 'football_match_db_v2';
    let allMatches = [];
    let previewMatches = [];

    function init() {
      try {
        loadFromStorage();
        setupNavigation();
        setupDropZone();
        refreshRecordCount();
        refreshAnalysisSelect();
        renderHistory();
        console.log('✅ 系统初始化完成，现有记录：' + allMatches.length);
      } catch (e) {
        console.error('初始化失败：', e);
        showToast('系统初始化错误，请刷新页面', 'error');
      }
    }

    function loadFromStorage() {
      try { allMatches = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch (e) { allMatches = []; }
    }

    function saveToStorage() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(allMatches));
      refreshRecordCount();
    }

    function refreshRecordCount() {
      document.getElementById('recordCount').textContent = allMatches.length;
    }

    function setupNavigation() {
      document.querySelectorAll('.nav-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
          document.getElementById(`panel-${tab.dataset.panel}`).classList.add('active');
          if (tab.dataset.panel === 'analysis') refreshAnalysisSelect();
          if (tab.dataset.panel === 'history') renderHistory();
        });
      });
    }

    function setupDropZone() {
      const dropZone = document.getElementById('dropZone');
      const fileInput = document.getElementById('fileInput');
      dropZone.addEventListener('click', () => fileInput.click());
      fileInput.addEventListener('change', (e) => {
        console.log('选择了文件：', e.target.files);
        handleFiles(e.target.files);
      });
      dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
      dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
      dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        handleFiles(e.dataTransfer.files);
      });
    }

    async function handleFiles(files) {
      if (!files || files.length === 0) return;
      showToast('📂 正在解析文件...', 'info');
      let allParsed = [];
      for (let file of files) {
        console.log(`处理文件：${file.name} (${file.type})`);
        try {
          const ext = file.name.split('.').pop().toLowerCase();
          if (ext === 'csv') {
            const text = await file.text();
            allParsed = allParsed.concat(parseCSV(text));
          } else if (ext === 'xlsx' || ext === 'xls') {
            const data = await file.arrayBuffer();
            const workbook = XLSX.read(data, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const json = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
            if (json.length > 0) {
              const headers = json[0].map(h => String(h).trim());
              allParsed = allParsed.concat(json.slice(1).map(row => {
                const obj = {};
                headers.forEach((h, i) => obj[h] = row[i] !== undefined ? String(row[i]).trim() : '');
                return obj;
              }));
            }
          } else if (ext === 'json') {
            const text = await file.text();
            const arr = JSON.parse(text);
            allParsed = allParsed.concat(Array.isArray(arr) ? arr : [arr]);
          } else if (ext === 'txt' || ext === 'html' || ext === 'htm') {
            const text = await file.text();
            if (ext === 'html' || ext === 'htm') {
              allParsed = allParsed.concat(parseHTMLTable(text));
            } else {
              allParsed = allParsed.concat(parseTXT(text));
            }
          } else {
            showToast(`不支持的文件类型：${ext}`, 'error');
          }
        } catch (err) {
          console.error(`解析文件 ${file.name} 失败：`, err);
          showToast(`文件 ${file.name} 解析失败：${err.message}`, 'error');
        }
      }
      console.log('解析结果总数：', allParsed.length);
      if (allParsed.length > 0) {
        previewMatches = mapToStandardFields(allParsed);
        showPreview();
        showToast(`已解析 ${previewMatches.length} 条记录`, 'success');
      } else {
        showToast('❌ 未能解析有效数据，请检查文件内容', 'error');
        previewMatches = [];
        clearPreview();
      }
    }

    function parseCSV(text) {
      const result = Papa.parse(text, { header: true, skipEmptyLines: true, trimHeaders: true, trimValues: true });
      console.log('CSV解析行数：', result.data.length);
      return result.data;
    }

    function parseTXT(text) {
      let result = Papa.parse(text, { header: true, skipEmptyLines: true, trimHeaders: true, trimValues: true, delimiter: "" });
      if (result.data.length === 0 || (result.data.length === 1 && Object.keys(result.data[0]).length <= 1)) {
        result = Papa.parse(text, { header: true, skipEmptyLines: true, trimHeaders: true, trimValues: true, delimiter: "\t" });
      }
      console.log('TXT解析行数：', result.data.length);
      return result.data;
    }

    function parseHTMLTable(htmlText) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(htmlText, 'text/html');
      const tables = doc.querySelectorAll('table');
      let allRows = [];
      tables.forEach(table => {
        const headers = [];
        const thead = table.querySelector('thead');
        let headerRow = thead ? thead.querySelector('tr') : table.querySelector('tr');
        if (headerRow) {
          headerRow.querySelectorAll('th, td').forEach(cell => headers.push(cell.textContent.trim()));
        }
        const tbody = table.querySelector('tbody') || table;
        const rows = tbody.querySelectorAll('tr');
        rows.forEach(row => {
          if (row === headerRow && !thead) return;
          const cells = row.querySelectorAll('td, th');
          if (cells.length === 0) return;
          const obj = {};
          cells.forEach((cell, i) => {
            const key = headers[i] || `col_${i}`;
            obj[key] = cell.textContent.trim();
          });
          allRows.push(obj);
        });
      });
      console.log('HTML表格提取行数：', allRows.length);
      return allRows;
    }

    function mapToStandardFields(rawArray) {
      const fieldMap = {
        homeTeam: ['主队','home_team','hometeam','home','主队名称','球队1'],
        awayTeam: ['客队','away_team','awayteam','away','客队名称','球队2'],
        score: ['比分','score','全场比分','result','final_score'],
        league: ['联赛','league','competition','赛事'],
        date: ['日期','date','match_date','比赛日期'],
        oddsHome: ['欧赔主胜','odds_home','home_odds','主胜赔率'],
        oddsDraw: ['欧赔平局','odds_draw','draw_odds','平赔'],
        oddsAway: ['欧赔客胜','odds_away','away_odds','客胜赔率'],
        asianHandicap: ['亚盘','asian_handicap','handicap','盘口'],
        homeRank: ['主队排名','home_rank','主排名'],
        awayRank: ['客队排名','away_rank','客排名'],
        homeRecent: ['主队近期','home_recent','主近期战绩'],
        awayRecent: ['客队近期','away_recent','客近期战绩'],
        notes: ['备注','notes','remark']
      };
      return rawArray.map((item, idx) => {
        const mapped = { id: 'imp_' + Date.now() + '_' + idx };
        Object.keys(fieldMap).forEach(key => {
          for (let alias of fieldMap[key]) {
            if (item[alias] !== undefined && item[alias] !== '') {
              mapped[key] = String(item[alias]).trim();
              break;
            }
          }
        });
        if (!mapped.homeTeam && !mapped.awayTeam) {
          const keys = Object.keys(item);
          if (keys.length >= 2) {
            mapped.homeTeam = String(item[keys[0]] || '').trim();
            mapped.awayTeam = String(item[keys[1]] || '').trim();
          }
        }
        return mapped;
      }).filter(m => m.homeTeam || m.awayTeam);
    }

    function showPreview() {
      document.getElementById('previewCard').style.display = 'block';
      document.getElementById('previewCount').textContent = `共 ${previewMatches.length} 条待导入`;
      const wrap = document.getElementById('previewTableWrap');
      if (previewMatches.length === 0) {
        wrap.innerHTML = '<div class="empty-state">无有效数据</div>';
        return;
      }
      const cols = ['homeTeam','awayTeam','score','league','date','oddsHome','oddsDraw','oddsAway','asianHandicap'];
      const headers = ['主队','客队','比分','联赛','日期','主胜赔','平赔','客胜赔','亚盘'];
      let html = '<table><thead><tr>';
      headers.forEach(h => html += `<th>${h}</th>`);
      html += '</tr></thead><tbody>';
      previewMatches.forEach(m => {
        html += '<tr>';
        cols.forEach(c => html += `<td>${escapeHtml(m[c] || '')}</td>`);
        html += '</tr>';
      });
      html += '</tbody></table>';
      wrap.innerHTML = html;
    }

    function clearPreview() {
      previewMatches = [];
      document.getElementById('previewCard').style.display = 'none';
    }

    function confirmImport() {
      const btn = document.getElementById('confirmImportBtn');
      if (previewMatches.length === 0) {
        showToast('❌ 没有可导入的数据，请先上传文件', 'error');
        btn.style.transform = 'scale(0.95)';
        setTimeout(() => btn.style.transform = '', 200);
        return;
      }
      btn.disabled = true;
      btn.textContent = '⏳ 导入中...';
      setTimeout(() => {
        const toImport = previewMatches.map(m => ({...m, created_at: new Date().toISOString()}));
        allMatches = [...toImport, ...allMatches];
        saveToStorage();
        clearPreview();
        refreshAnalysisSelect();
        renderHistory();
        btn.disabled = false;
        btn.textContent = '✅ 确认导入到数据库';
        showToast(`🎉 成功导入 ${toImport.length} 场比赛！`, 'success');
      }, 200);
    }

    // 粘贴功能
    function openPasteModal() { document.getElementById('pasteModal').style.display = 'flex'; }
    function closePasteModal() { document.getElementById('pasteModal').style.display = 'none'; document.getElementById('pasteArea').value = ''; }
    function processPastedData() {
      const text = document.getElementById('pasteArea').value.trim();
      if (!text) return;
      let parsed;
      if (/<table[\s>]/i.test(text)) {
        parsed = parseHTMLTable(text);
      } else {
        parsed = Papa.parse(text, { header: true, skipEmptyLines: true, trimHeaders: true, trimValues: true, delimiter: "" }).data;
        if (parsed.length === 0 || (parsed.length === 1 && Object.keys(parsed[0]).length <= 1)) {
          parsed = Papa.parse(text, { header: true, skipEmptyLines: true, trimHeaders: true, trimValues: true, delimiter: "\t" }).data;
        }
      }
      if (parsed.length === 0) return showToast('未识别到表格数据', 'error');
      previewMatches = mapToStandardFields(parsed);
      closePasteModal();
      showPreview();
      showToast(`从粘贴板解析 ${previewMatches.length} 条`, 'success');
    }

    function loadDemoData() {
      previewMatches = mapToStandardFields([
        { league:'英超', date:'2026-06-08', home_team:'曼城', away_team:'阿森纳', score:'3:1', odds_home:1.85, odds_draw:3.60, odds_away:4.20, asian_handicap:'-0.75', home_rank:1, away_rank:2 },
        { league:'西甲', date:'2026-06-07', home_team:'巴萨', away_team:'皇马', score:'1:2', odds_home:2.50, odds_draw:3.30, odds_away:2.75 },
      ]);
      showPreview();
      showToast('演示数据已加载，点击“确认导入”即可存入数据库', 'info');
    }

    // 分析相关函数（保持不变，省略以节省空间）
    function refreshAnalysisSelect() {
      const sel = document.getElementById('analysisSelect');
      sel.innerHTML = '<option value="">-- 选择比赛 --</option>';
      allMatches.forEach((m, i) => {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = `[${m.league||'?'}] ${m.homeTeam||'?'} vs ${m.awayTeam||'?'} (${m.date||''})`;
        sel.appendChild(opt);
      });
    }

    function runAnalysis() {
      const idx = document.getElementById('analysisSelect').value;
      if (idx === '') return showToast('请选择比赛', 'error');
      const m = allMatches[parseInt(idx)];
      const analysis = computeAnalysis(m);
      renderAnalysis(m, analysis);
      renderRecommendation(m, analysis);
    }

    function computeAnalysis(m) {
      let score = 50; const details = [];
      const homeForm = parseForm(m.homeRecent), awayForm = parseForm(m.awayRecent);
      const hScore = calcFormScore(homeForm), aScore = calcFormScore(awayForm);
      const diff = hScore - aScore;
      if (diff > 15) { score += 12; details.push('主队状态更好'); }
      else if (diff > 5) { score += 6; details.push('主队状态略好'); }
      else if (diff < -15) { score -= 12; details.push('客队状态更好'); }
      else if (diff < -5) { score -= 6; details.push('客队状态略好'); }
      else details.push('状态接近');
      const hr = parseInt(m.homeRank), ar = parseInt(m.awayRank);
      if (!isNaN(hr) && !isNaN(ar)) {
        const rd = ar - hr;
        if (rd > 8) { score += 10; details.push('主队排名大幅领先'); }
        else if (rd > 3) { score += 5; details.push('主队排名占优'); }
        else if (rd < -8) { score -= 10; details.push('客队排名大幅领先'); }
        else if (rd < -3) { score -= 5; details.push('客队排名占优'); }
        else details.push('排名接近');
      }
      const oh=parseFloat(m.oddsHome), od=parseFloat(m.oddsDraw), oa=parseFloat(m.oddsAway);
      if (oh && od && oa) {
        const total = 1/oh+1/od+1/oa, ph=1/oh/total, pa=1/oa/total;
        if (ph-pa > 0.2) { score+=12; details.push('赔率强烈支持主队'); }
        else if (ph-pa > 0.08) { score+=6; details.push('赔率倾向主队'); }
        else if (ph-pa < -0.2) { score-=12; details.push('赔率强烈支持客队'); }
        else if (ph-pa < -0.08) { score-=6; details.push('赔率倾向客队'); }
        else details.push('赔率均衡');
      }
      if (m.asianHandicap) {
        const line = parseFloat(m.asianHandicap);
        if (line <= -1) { score+=8; details.push('亚盘深盘支持主队'); }
        else if (line <= -0.5) { score+=4; details.push('亚盘倾向主队'); }
        else if (line >= 1) { score-=8; details.push('亚盘深盘支持客队'); }
        else if (line >= 0.5) { score-=4; details.push('亚盘倾向客队'); }
      }
      score = Math.min(95, Math.max(10, Math.round(score)));
      return { score, details, homeForm, awayForm, hScore, aScore };
    }

    function parseForm(s) { /* 同上 */ if (!s) return []; return s.replace(/[\s,，]+/g,'').toUpperCase().split('').map(c => c==='W'||c==='胜'?'W':c==='D'||c==='平'?'D':c==='L'||c==='负'?'L':null).filter(Boolean).slice(0,5); }
    function calcFormScore(arr) { /* 同上 */ if (!arr.length) return 50; let s=50; const w=[1.5,1.3,1.1,0.9,0.7]; arr.forEach((r,i) => { if(r==='W') s+=8*w[i]; else if(r==='L') s-=7*w[i]; }); return Math.min(95,Math.max(5,Math.round(s))); }

    function renderAnalysis(m, a) {
      const cls = a.score>=65?'score-high':a.score>=40?'score-mid':'score-low';
      document.getElementById('analysisOutput').innerHTML = `
        <div style="display:flex;align-items:center;gap:16px;">
          <div class="score-circle ${cls}">${a.score}</div>
          <div><strong style="font-size:1.2rem;">综合评分</strong><br><span style="color:var(--text2)">主队倾向指数</span></div>
        </div>
        <ul style="margin-top:16px;padding-left:20px;color:var(--text2);">${a.details.map(d=>`<li>${d}</li>`).join('')}</ul>
        <div style="margin-top:12px;display:flex;gap:20px;">
          <div><small>主队状态分</small><div class="progress-bar"><div class="progress-fill" style="width:${a.hScore}%;background:var(--primary);"></div></div><strong>${a.hScore}</strong></div>
          <div><small>客队状态分</small><div class="progress-bar"><div class="progress-fill" style="width:${a.aScore}%;background:var(--accent);"></div></div><strong>${a.aScore}</strong></div>
        </div>`;
    }

    function renderRecommendation(m, a) {
      let rec='', conf='';
      if (a.score>=65) { rec='主胜'; conf='⭐⭐⭐⭐'; }
      else if (a.score>=50) { rec='主胜/平局'; conf='⭐⭐⭐'; }
      else if (a.score>=35) { rec='客胜/平局'; conf='⭐⭐⭐'; }
      else { rec='客胜'; conf='⭐⭐⭐⭐'; }
      document.getElementById('recommendOutput').innerHTML = `
        <div style="background:var(--surface2);border-radius:var(--radius-sm);padding:18px;border:1px solid var(--border);">
          <div style="font-size:1.3rem;font-weight:700;">🎯 ${rec}</div>
          <div style="color:var(--text2);">信心指数：${conf}</div>
          <div style="margin-top:10px;font-size:0.9rem;">${m.homeTeam||'?'} vs ${m.awayTeam||'?'} · ${m.league||''}</div>
          <div style="font-size:0.75rem;color:var(--text2);margin-top:8px;">⚠️ 分析仅供参考</div>
        </div>`;
    }

    function renderHistory() {
      const search = (document.getElementById('searchInput')?.value || '').toLowerCase();
      let filtered = allMatches.filter(m => 
        (m.homeTeam||'').toLowerCase().includes(search) ||
        (m.awayTeam||'').toLowerCase().includes(search) ||
        (m.league||'').toLowerCase().includes(search)
      );
      const wrap = document.getElementById('historyTableWrap');
      if (!filtered.length) { wrap.innerHTML = '<div class="empty-state">📭 暂无记录</div>'; return; }
      let html = '<table><thead><tr><th>日期</th><th>联赛</th><th>主队</th><th>比分</th><th>客队</th><th>欧赔</th><th>操作</th></tr></thead><tbody>';
      filtered.forEach(m => {
        html += `<tr><td>${m.date||''}</td><td>${m.league||''}</td>
          <td><span class="tag tag-home">${escapeHtml(m.homeTeam||'')}</span></td>
          <td><strong>${m.score||'?:?'}</strong></td>
          <td><span class="tag tag-away">${escapeHtml(m.awayTeam||'')}</span></td>
          <td>${[m.oddsHome,m.oddsDraw,m.oddsAway].map(v=>v||'-').join('/')}</td>
          <td><button class="btn btn-sm btn-outline" onclick="deleteMatchById('${m.id}')">🗑</button></td></tr>`;
      });
      html += '</tbody></table>';
      wrap.innerHTML = html;
    }

    window.deleteMatchById = (id) => {
      allMatches = allMatches.filter(m => m.id !== id);
      saveToStorage(); refreshAnalysisSelect(); renderHistory();
      showToast('已删除', 'info');
    };

    function clearAll() {
      if (!confirm('清空所有数据？')) return;
      allMatches = []; saveToStorage(); refreshAnalysisSelect(); renderHistory();
      showToast('数据已清空', 'error');
    }

    function escapeHtml(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
    function showToast(msg, type='info') {
      const c = document.getElementById('toastContainer');
      const t = document.createElement('div'); t.className=`toast ${type}`; t.textContent=msg;
      c.appendChild(t); setTimeout(()=>{ t.style.opacity='0'; setTimeout(()=>t.remove(),300); },2800);
    }

    init();
  })();
</script>
